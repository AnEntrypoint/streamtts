- id: assert-model-quality
  subject: Run quality assertion after fixes showing loss decreases from 12.45 baseline
  status: pending
  description: After real weights + sequence CE fix, run short training witness and assert mean loss decreases from stuck 12.45 baseline. Print perplexity summary.
  effort: medium
  category: feature
  route_family: observability
  load: 0.8
  failure_modes:
    - 1.5B weights not cached; 3GB download needed
    - runner cannot sustain multi-minute background build or HF download
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy:
    - external: requires 3GB HF download + release build which runner cannot sustain in background
  acceptance:
    - cargo check exits 0 on all changes [DONE - b51dd94]
    - quality-assert command shows perplexity/loss report from real checkpoint
  manual_witness: |
    cargo build --release -p sttx-cli  (use RUSTUP_TOOLCHAIN=1.95.0 explicit path)
    target/release/streamtts.exe validate-data --ccsniff-from ccsniff-full-history.ndjson --ccsniff-from C:/dev/cc.jsonl
    target/release/streamtts.exe quality-assert --checkpoint ckpt-full-pairs --steps 20
