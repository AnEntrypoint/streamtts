- id: "fix-pages-workflow"
  subject: "Replace upload-pages-artifact with gh-pages branch push"
  status: "pending"
  description: "Prior workflow fails: deploy-pages@v3 cannot find artifact (known GitHub Actions bug). Solution: push docs/ to gh-pages branch; GitHub Pages serves from gh-pages when configured."
  effort: "small"
  category: "infra"
  route_family: "execution"
  load: 0.9
  failure_modes:
    - "gh-pages branch not created"
    - "GitHub Pages source not configured for gh-pages"
  route_fit: "dominant"
  authorization: "witnessed"
  blocking:
    - "verify-live-deployment"
  blockedBy:
  
  acceptance:
    - "Workflow completes successfully after push to main"
    - "deploy-pages action removed from workflow"
    - "git push to gh-pages successful in workflow logs"
    - "GitHub Pages serves from https://anentrypoint.github.io/streamtts/"
  edge_cases:
    - "orphan gh-pages branch"
    - "docs/ root index.html served at /streamtts/"

- id: "verify-live-deployment"
  subject: "Witness live Pages deployment with browser"
  status: "pending"
  description: "After workflow succeeds, navigate to live Pages URL and assert page renders correctly."
  effort: "small"
  category: "infra"
  route_family: "execution"
  load: 0.9
  failure_modes:
    - "404 Not Found"
    - "webjsx import error in console"
    - "missing DOM elements"
  route_fit: "dominant"
  authorization: "witnessed"
  blocking:
  
  blockedBy:
    - "fix-pages-workflow"
  acceptance:
    - "HTTP 200 on https://anentrypoint.github.io/streamtts/"
    - "page.evaluate returns DOM element count > 0"
    - "no \"requested module does not provide export\" errors in console"
    - "h1 \"streamtts\" visible"
  edge_cases:
    - "CORS on subpath /streamtts/"