- id: resume-rwkv-training
  subject: Resume RWKV-7 training with ccsniff full history
  status: in_progress
  description: |
    Once candle-transformers compiles with rwkv_v7 support, run witness test (synthetic safetensors, 2 steps) then full training on ccsniff-full-history.ndjson (28k traces, 100k steps, checkpoint every 1k). Verify: model load, tokenizer init, training step succeeds, checkpoint save round-trip, observability logs to .gm/log/.
  effort: large
  category: feature
  route_family: execution
  load: 0.85
  failure_modes:
    - model download stalls or fails
    - training OOM (3GB model + activations + buffer)
    - checkpoint serialization breaks
    - logs not appearing in .gm/log/
  route_fit: examined
  authorization: weak_prior
  blocking: []
  blockedBy: []
  acceptance:
    - witness test completes (synthetic safetensors, 2 steps)
    - cargo run --release completes 100k steps without panic
    - checkpoint-final exists with valid metadata
    - .gm/log/train.jsonl has >=1000 lines
  continuation: |
    Training restarted 2026-05-02T04:35 with cleared HF cache.
    Model download: PID 1989, ~2.9G of 3GB cached, ETA ~3 min.
    First step: ETA ~5 min after model load.
    100k steps: ETA ~4–6 hours total.
    Monitor: wc -l .gm/log/2026-05-02/train.jsonl (target >=1000).
    Post-completion: status→completed, delete .gm/prd.yml, commit & push.
  edge_cases:
    - ccsniff-full-history.ndjson missing (re-export if needed)
    - GPU OOM mid-training (fallback to CPU via --cpu flag)
