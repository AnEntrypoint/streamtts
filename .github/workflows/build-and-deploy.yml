name: Build and Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Deploy to gh-pages
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout --orphan gh-pages
          git rm -rf .
          # Copy docs contents from main to working tree root
          git checkout main -- docs/
          # Move all files from docs/ to root
          for f in docs/*; do
            [ -e "$f" ] && mv "$f" .
          done
          rmdir docs 2>/dev/null || true
          git add .
          git commit -m "Deploy from main: $(git rev-parse --short main)" || echo "No changes to commit"
          git push -f origin gh-pages
